<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apoio Seguro - Botão de Pânico</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="app-body">
    <button id="quickExitBtn" class="quick-exit-btn" aria-label="Sair rapidamente do site">
        Saída Rápida (Esc)
    </button>

    <main class="app-container bg-light-pink-container">

        <header class="app-header header-panico">
            <div class="header-title-row">
                <a href="dashboard.html" class="btn-voltar-icon"><i class="fa-solid fa-arrow-left"></i></a>
                <h2>Botão de Pânico</h2>
            </div>
        </header>

        <section class="panico-content">
            <div class="sos-center-wrapper">
                <button id="btnPedirAjuda" class="btn-pedir-ajuda">
                    <i class="fa-solid fa-triangle-exclamation"></i>
                    <span>PEDIR AJUDA</span>
                </button>
            </div>

            <p class="panico-descricao">
                Ao apertar este botão, uma mensagem com sua localização será enviada aos seus contatos de confiança.
            </p>

            <button id="btnConfigurarContatos" class="btn-configurar-contatos">
                Configurar contatos
            </button>
        </section>
    </main>

    <script src="emergencia.js"></script>
</body>

</html>
