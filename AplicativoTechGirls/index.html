<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apoio Seguro - Entrada</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="CSS_paste/global.css">
    <link rel="stylesheet" href="CSS_paste/index.css">
</head>

<body class="login-body">
    <button id="quickExitBtn" class="quick-exit-btn" aria-label="Sair rapidamente do site">
        Saída Rápida (Esc)
    </button>

    <main class="login-container">
        <div class="login-card">
            <div class="logo-icon">
                <i class="fa-solid fa-hand-holding-heart"></i>
            </div>

            <h1>Apoio Seguro</h1>
            <p>Um espaço seguro e discreto para você.</p>

            <form id="loginForm">
                <div class="input-group">
                    <label for="nickname">Apelido ou Nome de Acesso</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-user input-icon"></i>
                        <input type="text" id="nickname" placeholder="Como deseja ser chamada?" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="pin">PIN de Segurança (4 dígitos)</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input type="password" id="pin" placeholder="****" inputmode="numeric" maxlength="4" required>
                    </div>
                </div>

                <button type="submit" class="btn-primary">Entrar com Segurança</button>
            </form>

            <a href="dashboard.html" class="guest-link">Quero apenas ler informações (Acesso Anônimo)</a>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
